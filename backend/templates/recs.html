<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Platter · Recs Portal</title>
  <style>
    :root {
      --bg: #0f0f0f; --card: #1a1a1a; --line: #2a2a2a; --text: #f4f4f4;
      --muted: #9a9a9a; --orange: #ff5722; --orange-dim: #e64a1a; --green: #34c759;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
    header { padding: 20px 24px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 12px; position: sticky; top: 0; background: var(--bg); z-index: 10; }
    header h1 { font-size: 20px; font-weight: 800; }
    header .pill { font-size: 11px; color: var(--muted); border: 1px solid var(--line); border-radius: 999px; padding: 4px 10px; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .searchbar { display: flex; gap: 10px; margin-bottom: 24px; }
    .searchbar input { flex: 1; padding: 14px 16px; border-radius: 12px; border: 1px solid var(--line); background: var(--card); color: var(--text); font-size: 15px; }
    button { cursor: pointer; border: none; border-radius: 12px; font-weight: 600; font-size: 14px; transition: transform .08s, background .15s; }
    button:active { transform: scale(.97); }
    .btn-primary { background: var(--orange); color: #fff; padding: 14px 22px; }
    .btn-primary:hover { background: var(--orange-dim); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--line); padding: 8px 14px; }
    .btn-ghost:hover { color: var(--text); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
    .card { position: relative; background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 16px; }
    .saved-badge { position: absolute; top: 12px; right: 12px; background: rgba(52,199,89,.15); color: var(--green); font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 999px; display: flex; align-items: center; gap: 4px; }
    .card h3 { font-size: 16px; margin-bottom: 4px; }
    .card .meta { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
    .card .row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .badge { font-size: 11px; padding: 3px 9px; border-radius: 999px; font-weight: 700; }
    .badge.draft { background: #2a2a2a; color: var(--muted); }
    .badge.published { background: rgba(52,199,89,.15); color: var(--green); }
    .section-title { font-size: 13px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 28px 0 12px; }
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: none; align-items: flex-start; justify-content: center; padding: 40px 16px; overflow-y: auto; z-index: 50; }
    .modal-bg.open { display: flex; }
    .modal { background: var(--card); border: 1px solid var(--line); border-radius: 18px; width: 100%; max-width: 640px; padding: 24px; }
    .modal h2 { font-size: 18px; margin-bottom: 4px; }
    .modal .sub { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
    textarea { width: 100%; min-height: 200px; padding: 14px; border-radius: 12px; border: 1px solid var(--line); background: var(--bg); color: var(--text); font-size: 14px; font-family: ui-monospace, monospace; resize: vertical; }
    .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
    .preview { margin-top: 20px; border-top: 1px solid var(--line); padding-top: 16px; }
    .menu-section { margin-bottom: 14px; }
    .menu-section h4 { font-size: 12px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .menu-item { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; }
    .rec-chip { display: inline-block; background: rgba(255,87,34,.12); color: var(--orange); font-size: 12px; padding: 5px 11px; border-radius: 999px; margin: 0 6px 6px 0; }
    .combo-card { border: 1px solid var(--line); border-radius: 14px; padding: 14px; margin-bottom: 12px; }
    .combo-card .ctitle { font-size: 15px; font-weight: 700; }
    .combo-card .csub { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .combo-card .tag { display: inline-block; background: #2a2a2a; color: var(--muted); font-size: 11px; padding: 3px 8px; border-radius: 999px; margin: 0 4px 8px 0; }
    .combo-line { display: flex; justify-content: space-between; font-size: 13px; padding: 2px 0; }
    .combo-total { display: flex; justify-content: space-between; font-size: 14px; font-weight: 700; border-top: 1px solid var(--line); margin-top: 8px; padding-top: 8px; }
    .combo-total .per { color: var(--muted); font-weight: 500; font-size: 12px; }
    .tabs { display: flex; gap: 8px; margin: 4px 0 14px; }
    .tab { background: transparent; color: var(--muted); border: 1px solid var(--line); padding: 6px 14px; border-radius: 999px; font-size: 13px; }
    .tab.active { background: var(--orange); color: #fff; border-color: var(--orange); }
    .test-panel { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 20px; }
    .test-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; }
    .fld { display: flex; flex-direction: column; gap: 6px; }
    .fld > span { font-size: 12px; color: var(--muted); font-weight: 600; }
    .fld input, .fld select { padding: 10px 12px; border-radius: 10px; border: 1px solid var(--line); background: var(--bg); color: var(--text); font-size: 14px; }
    .chip-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .toggle-chip { background: var(--bg); color: var(--muted); border: 1px solid var(--line); padding: 7px 13px; border-radius: 999px; font-size: 13px; }
    .toggle-chip.on { background: var(--orange); color: #fff; border-color: var(--orange); }
    .tags-line { margin-bottom: 12px; }
    .empty { color: var(--muted); font-size: 14px; padding: 30px 0; text-align: center; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .warn { background: rgba(255,200,0,.1); color: #ffcf4d; font-size: 12px; padding: 8px 12px; border-radius: 8px; margin-top: 10px; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid var(--line); padding: 12px 20px; border-radius: 12px; font-size: 14px; display: none; z-index: 100; }
    .toast.show { display: block; }
  </style>
</head>
<body>
  <header>
    <h1>🍽️ Platter Recs Portal</h1>
    <span class="pill" id="status-pill">checking…</span>
  </header>

  <div class="wrap">
    <div class="searchbar">
      <input id="search-input" placeholder="Search a location or restaurant (e.g. Gardena)" />
      <button class="btn-primary" onclick="runSearch()">Search</button>
    </div>

    <div id="search-results"></div>

    <div class="section-title">Saved restaurants</div>
    <div id="saved-list"><div class="empty">Loading…</div></div>

    <div class="section-title">🧪 Test the algorithm</div>
    <div class="test-panel">
      <div class="test-grid">
        <label class="fld">
          <span>Restaurant</span>
          <select id="t-restaurant"></select>
        </label>
        <label class="fld">
          <span>Party size</span>
          <input id="t-party" type="number" min="1" max="20" value="2" />
        </label>
        <label class="fld">
          <span>Total budget ($)</span>
          <input id="t-budget" type="number" min="10" step="5" value="75" />
        </label>
        <label class="fld">
          <span># Vegetarians</span>
          <input id="t-veg" type="number" min="0" max="20" value="0" />
        </label>
      </div>

      <div class="fld" style="margin-top:14px"><span>Optimize for</span></div>
      <div id="t-goals" class="chip-row"></div>

      <div class="fld" style="margin-top:14px"><span>Dietary restrictions</span></div>
      <div id="t-diet" class="chip-row"></div>

      <label class="fld" style="margin-top:14px">
        <span>Notes (free text)</span>
        <input id="t-notes" type="text" placeholder="e.g. no spicy, loves seafood" />
      </label>

      <div class="modal-actions" style="margin-top:16px">
        <button class="btn-primary" id="t-run" onclick="runAlgorithm()">Run algorithm</button>
      </div>

      <div id="t-results" class="preview" style="display:none"></div>
    </div>
  </div>

  <!-- Add Menu modal -->
  <div class="modal-bg" id="modal">
    <div class="modal">
      <h2 id="modal-title">Add menu</h2>
      <div class="sub" id="modal-sub"></div>
      <textarea id="menu-text" placeholder="Paste the rough menu here…&#10;&#10;Margherita Pizza 18&#10;Spaghetti Carbonara 17&#10;Tiramisu 8&#10;House Wine 10"></textarea>
      <div class="modal-actions">
        <button class="btn-primary" id="gen-btn" onclick="generate()">Generate Menu &amp; Recs</button>
        <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      </div>
      <div class="warn" id="modal-warn" style="display:none"></div>
      <div class="preview" id="preview" style="display:none">
        <div id="preview-menu"></div>
        <div class="section-title" style="margin-top:18px">Recommendation cards</div>
        <div id="preview-recs"></div>
        <div class="modal-actions">
          <button class="btn-primary" id="save-btn" onclick="save()">Save to Discover</button>
        </div>
      </div>
    </div>
  </div>

  <!-- View combos modal -->
  <div class="modal-bg" id="combo-modal">
    <div class="modal">
      <div class="row"><h2 id="combo-title">Combos</h2><button class="btn-ghost" onclick="closeCombos()">Close</button></div>
      <div class="sub" id="combo-sub"></div>
      <div class="tabs">
        <button class="tab active" id="tab-combos" onclick="switchTab('combos')">Combos</button>
        <button class="tab" id="tab-menu" onclick="switchTab('menu')">Full menu</button>
      </div>
      <div id="combo-body"><div class="empty"><span class="spinner"></span> Loading…</div></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let current = null;       // restaurant being edited
    let lastPreview = null;   // { menu, recommendations }
    let savedPlaceIds = new Set();
    let savedNames = new Set();
    let savedIdByPlace = {};   // place_id -> db id
    let savedIdByName = {};    // lowercased name -> db id

    function isSaved(p) {
      if (p.place_id && savedPlaceIds.has(p.place_id)) return true;
      return savedNames.has((p.name || '').trim().toLowerCase());
    }

    function savedDbId(p) {
      if (p.place_id && savedIdByPlace[p.place_id]) return savedIdByPlace[p.place_id];
      return savedIdByName[(p.name || '').trim().toLowerCase()];
    }

    async function checkStatus() {
      try {
        const r = await fetch('/health');
        const j = await r.json();
        const bits = [];
        bits.push(j.openai_configured ? 'OpenAI ✓' : 'OpenAI ✗');
        bits.push(j.places_configured ? 'Places ✓' : 'Places ✗');
        document.getElementById('status-pill').textContent = bits.join(' · ');
      } catch { document.getElementById('status-pill').textContent = 'offline'; }
    }

    function fmtPrice(c) { return '$' + (c / 100).toFixed(2); }

    async function runSearch() {
      const q = document.getElementById('search-input').value.trim();
      if (!q) return;
      const box = document.getElementById('search-results');
      box.innerHTML = '<div class="empty"><span class="spinner"></span> Searching…</div>';
      try {
        const r = await fetch('/admin/places/search?q=' + encodeURIComponent(q));
        if (!r.ok) { box.innerHTML = '<div class="empty">' + (await r.json()).detail + '</div>'; return; }
        const places = await r.json();
        if (!places.length) { box.innerHTML = '<div class="empty">No results.</div>'; return; }
        window._places = places;
        renderResults();
      } catch (e) { box.innerHTML = '<div class="empty">Search failed: ' + e + '</div>'; }
    }

    function renderResults() {
      const places = window._places;
      if (!places || !places.length) return;
      document.getElementById('search-results').innerHTML =
        '<div class="section-title">Results</div><div class="grid">' +
        places.map((p, i) => cardHTML(p, i)).join('') + '</div>';
    }

    function cardHTML(p, i) {
      const saved = isSaved(p);
      return `<div class="card">
        ${saved ? '<span class="saved-badge">✓ Saved</span>' : ''}
        <h3>${p.name}</h3>
        <div class="meta">${p.cuisine} · ${p.distance_miles} mi · ${p.price_tier} · ⭐ ${p.rating || '—'}</div>
        <div class="row" style="gap:8px;flex-wrap:wrap">
          <button class="btn-primary" style="padding:10px 16px" onclick="openModal(${i})">${saved ? '✏️ Edit menu' : '📖 Add menu'}</button>
          ${saved ? `<button class="btn-ghost" onclick="viewCombos(${i})">🍽️ View combos</button>` : ''}
        </div>
      </div>`;
    }

    function openModal(i) {
      current = { ...window._places[i], image_seed: i % 4, is_verified: true };
      document.getElementById('modal-title').textContent = current.name;
      document.getElementById('modal-sub').textContent = current.cuisine + ' · ' + current.distance_miles + ' mi';
      document.getElementById('menu-text').value = '';
      document.getElementById('preview').style.display = 'none';
      document.getElementById('modal-warn').style.display = 'none';
      document.getElementById('modal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      current = null; lastPreview = null;
    }

    async function generate() {
      const text = document.getElementById('menu-text').value.trim();
      if (!text) { return; }
      const btn = document.getElementById('gen-btn');
      btn.innerHTML = '<span class="spinner"></span> Generating…'; btn.disabled = true;
      try {
        const r = await fetch('/admin/generate', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: current.name, cuisine: current.cuisine,
            distance_miles: current.distance_miles, image_seed: current.image_seed,
            is_verified: true, raw_menu_text: text,
          }),
        });
        if (!r.ok) { showWarn((await r.json()).detail); return; }
        lastPreview = await r.json();
        renderPreview(lastPreview);
      } catch (e) { showWarn('Generate failed: ' + e); }
      finally { btn.innerHTML = 'Generate Menu &amp; Recs'; btn.disabled = false; }
    }

    function showWarn(msg) {
      const w = document.getElementById('modal-warn');
      w.textContent = msg; w.style.display = 'block';
    }

    function renderPreview(data) {
      const menuHTML = data.menu.sections.map(s => `
        <div class="menu-section">
          <h4>${s.name}</h4>
          ${s.items.map(it => `<div class="menu-item"><span>${it.name}</span><span>${fmtPrice(it.price_cents)}</span></div>`).join('')}
        </div>`).join('');
      document.getElementById('preview-menu').innerHTML =
        '<div class="section-title" style="margin-top:0">Parsed menu (' +
        data.menu.sections.reduce((n, s) => n + s.items.length, 0) + ' items)</div>' + menuHTML;
      document.getElementById('preview-recs').innerHTML =
        data.recommendations.map(c => `<span class="rec-chip">${c.combo.title} · ${fmtPrice(c.combo.total_cents)}</span>`).join('')
        || '<div class="empty">No cards generated.</div>';
      if (data.warnings && data.warnings.length) showWarn('Parser notes: ' + data.warnings.join('; '));
      document.getElementById('preview').style.display = 'block';
    }

    async function save() {
      if (!lastPreview) return;
      const btn = document.getElementById('save-btn');
      btn.innerHTML = '<span class="spinner"></span> Saving…'; btn.disabled = true;
      try {
        const r = await fetch('/admin/restaurants', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            place_id: current.place_id, name: current.name, cuisine: current.cuisine,
            address: current.address, lat: current.lat, lng: current.lng,
            rating: current.rating, review_count: current.review_count,
            price_tier: current.price_tier, distance_miles: current.distance_miles,
            image_seed: current.image_seed, is_verified: true,
            raw_menu_text: document.getElementById('menu-text').value,
            menu: lastPreview.menu, recommendations: lastPreview.recommendations,
          }),
        });
        if (!r.ok) { showWarn((await r.json()).detail); return; }
        const j = await r.json();
        toast(`Saved ${current.name} · ${j.cards} cards`);
        closeModal(); loadSaved();
      } catch (e) { showWarn('Save failed: ' + e); }
      finally { btn.innerHTML = 'Save to Discover'; btn.disabled = false; }
    }

    let comboData = null;     // last loaded restaurant detail
    let comboTab = 'combos';

    async function viewCombos(i) {
      const p = window._places[i];
      const dbId = savedDbId(p);
      comboData = null; comboTab = 'combos'; setActiveTab();
      document.getElementById('combo-title').textContent = p.name;
      document.getElementById('combo-sub').textContent = p.cuisine + ' · ' + p.distance_miles + ' mi';
      document.getElementById('combo-body').innerHTML = '<div class="empty"><span class="spinner"></span> Loading…</div>';
      document.getElementById('combo-modal').classList.add('open');
      if (!dbId) { document.getElementById('combo-body').innerHTML = '<div class="empty">Not saved yet.</div>'; return; }
      try {
        const r = await fetch('/admin/restaurants/' + dbId);
        if (!r.ok) { document.getElementById('combo-body').innerHTML = '<div class="empty">Could not load.</div>'; return; }
        comboData = await r.json();
        renderComboTab();
      } catch (e) {
        document.getElementById('combo-body').innerHTML = '<div class="empty">Error: ' + e + '</div>';
      }
    }

    function switchTab(tab) { comboTab = tab; setActiveTab(); renderComboTab(); }

    function setActiveTab() {
      document.getElementById('tab-combos').classList.toggle('active', comboTab === 'combos');
      document.getElementById('tab-menu').classList.toggle('active', comboTab === 'menu');
    }

    function renderComboTab() {
      if (!comboData) return;
      if (comboTab === 'menu') renderMenu(comboData.menu || {});
      else renderCombos(comboData.recommendations || []);
    }

    function renderMenu(menu) {
      const sections = menu.sections || [];
      if (!sections.length) { document.getElementById('combo-body').innerHTML = '<div class="empty">No menu saved.</div>'; return; }
      document.getElementById('combo-body').innerHTML = sections.map(s => `
        <div class="menu-section">
          <h4>${s.name}</h4>
          ${(s.items || []).map(it => `<div class="menu-item"><span>${it.name}</span><span>${fmtPrice(it.price_cents)}</span></div>`).join('')}
        </div>`).join('');
    }

    function renderCombos(recs) {
      if (!recs.length) { document.getElementById('combo-body').innerHTML = '<div class="empty">No combos for this restaurant.</div>'; return; }
      document.getElementById('combo-body').innerHTML = recs.map(rec => {
        const c = rec.combo;
        const per = rec.party_size > 0 ? (c.total_cents / rec.party_size) : c.total_cents;
        const lines = (c.line_items || []).map(li =>
          `<div class="combo-line"><span>${li.quantity}× ${li.name}</span><span>${fmtPrice(li.line_total_cents)}</span></div>`).join('');
        const tags = (rec.context_tags || []).map(t => `<span class="tag">${t}</span>`).join('');
        return `<div class="combo-card">
          <div class="ctitle">${c.title}</div>
          <div class="csub">${c.subtitle || ''} · party of ${rec.party_size} · budget ${fmtPrice(rec.budget_cents)}</div>
          <div>${tags}</div>
          ${lines}
          <div class="combo-total"><span>Total ${fmtPrice(c.total_cents)}</span><span class="per">${fmtPrice(per)} / person</span></div>
        </div>`;
      }).join('');
    }

    function closeCombos() { document.getElementById('combo-modal').classList.remove('open'); }

    async function loadSaved() {
      const box = document.getElementById('saved-list');
      try {
        const r = await fetch('/admin/restaurants');
        const rows = await r.json();
        savedPlaceIds = new Set(rows.filter(x => x.place_id).map(x => x.place_id));
        savedNames = new Set(rows.map(x => (x.name || '').trim().toLowerCase()));
        savedIdByPlace = {}; savedIdByName = {};
        rows.forEach(x => {
          if (x.place_id) savedIdByPlace[x.place_id] = x.id;
          savedIdByName[(x.name || '').trim().toLowerCase()] = x.id;
        });
        populateTestDropdown(rows);
        renderResults();
        if (!rows.length) { box.innerHTML = '<div class="empty">No restaurants saved yet.</div>'; return; }
        box.innerHTML = '<div class="grid">' + rows.map(row => `
          <div class="card">
            <div class="row"><h3>${row.name}</h3><span class="badge ${row.status}">${row.status}</span></div>
            <div class="meta">${row.cuisine} · ${row.distance_miles} mi</div>
            <div class="meta">${row.menu_item_count} items · ${row.card_count} cards</div>
            <div class="row" style="margin-top:8px">
              <button class="btn-ghost" onclick="del('${row.id}','${row.name.replace(/'/g, "")}')">Delete</button>
            </div>
          </div>`).join('') + '</div>';
      } catch { box.innerHTML = '<div class="empty">Could not load.</div>'; }
    }

    async function del(id, name) {
      if (!confirm('Delete ' + name + '?')) return;
      await fetch('/admin/restaurants/' + id, { method: 'DELETE' });
      toast('Deleted ' + name); loadSaved();
    }

    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ---------- Algorithm test panel ----------
    const GOALS = [
      ['best_value', 'Best value'], ['most_food', 'Most food'], ['best_variety', 'Best variety'],
      ['healthy', 'Healthy'], ['high_protein', 'High protein'], ['family_style', 'Family style'],
      ['kid_friendly', 'Kid friendly'], ['dessert_included', 'Dessert included'],
    ];
    const DIETS = [
      ['vegetarian', 'Vegetarian'], ['vegan', 'Vegan'], ['gluten_free', 'Gluten-free'],
      ['no_nuts', 'No nuts'], ['no_fish', 'No fish'], ['no_shellfish', 'No shellfish'],
      ['no_pork', 'No pork'], ['halal', 'Halal'], ['kosher', 'Kosher'], ['dairy_free', 'Dairy-free'],
    ];
    const selectedGoals = new Set(['best_value']);
    const selectedDiets = new Set();

    function buildChips() {
      document.getElementById('t-goals').innerHTML = GOALS.map(([k, l]) =>
        `<button class="toggle-chip ${selectedGoals.has(k) ? 'on' : ''}" data-g="${k}" onclick="toggleGoal('${k}')">${l}</button>`).join('');
      document.getElementById('t-diet').innerHTML = DIETS.map(([k, l]) =>
        `<button class="toggle-chip ${selectedDiets.has(k) ? 'on' : ''}" data-d="${k}" onclick="toggleDiet('${k}')">${l}</button>`).join('');
    }

    function toggleGoal(k) {
      if (selectedGoals.has(k)) { if (selectedGoals.size > 1) selectedGoals.delete(k); }
      else selectedGoals.add(k);
      buildChips();
    }
    function toggleDiet(k) {
      if (selectedDiets.has(k)) selectedDiets.delete(k); else selectedDiets.add(k);
      buildChips();
    }

    function populateTestDropdown(rows) {
      const withMenu = rows.filter(r => r.menu_item_count > 0);
      const sel = document.getElementById('t-restaurant');
      const prev = sel.value;
      sel.innerHTML = withMenu.length
        ? withMenu.map(r => `<option value="${r.id}">${r.name} (${r.menu_item_count} items)</option>`).join('')
        : '<option value="">No saved menus yet</option>';
      if (prev) sel.value = prev;
    }

    async function runAlgorithm() {
      const id = document.getElementById('t-restaurant').value;
      if (!id) { return; }
      const btn = document.getElementById('t-run');
      const out = document.getElementById('t-results');
      btn.innerHTML = '<span class="spinner"></span> Running…'; btn.disabled = true;
      const body = {
        party_size: parseInt(document.getElementById('t-party').value) || 1,
        budget_cents: Math.round((parseFloat(document.getElementById('t-budget').value) || 0) * 100),
        dietary_rules: [...selectedDiets],
        vegetarian_count: parseInt(document.getElementById('t-veg').value) || 0,
        optimize_goals: [...selectedGoals],
        free_text_notes: document.getElementById('t-notes').value,
      };
      try {
        const r = await fetch('/admin/restaurants/' + id + '/recommend', {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
        });
        if (!r.ok) { out.style.display = 'block'; out.innerHTML = '<div class="warn">' + (await r.json()).detail + '</div>'; return; }
        renderAlgoResults(await r.json());
      } catch (e) { out.style.display = 'block'; out.innerHTML = '<div class="warn">Failed: ' + e + '</div>'; }
      finally { btn.innerHTML = 'Run algorithm'; btn.disabled = false; }
    }

    function renderAlgoResults(data) {
      const out = document.getElementById('t-results');
      out.style.display = 'block';
      const tags = (data.constraint_tags || []).map(t => `<span class="rec-chip">${t}</span>`).join('');
      const combos = (data.combos || []).map(c => {
        const lines = (c.line_items || []).map(li =>
          `<div class="combo-line"><span>${li.quantity}× ${li.name}</span><span>${fmtPrice(li.line_total_cents)}</span></div>`).join('');
        const party = parseInt(document.getElementById('t-party').value) || 1;
        const per = party > 0 ? c.total_cents / party : c.total_cents;
        return `<div class="combo-card">
          <div class="ctitle">#${c.rank} ${c.title}${c.is_top_pick ? ' ⭐' : ''}</div>
          <div class="csub">${c.subtitle || ''}</div>
          ${lines}
          <div class="combo-total"><span>Total ${fmtPrice(c.total_cents)}</span><span class="per">${fmtPrice(per)}/person · saves ${fmtPrice(c.savings_cents)}</span></div>
        </div>`;
      }).join('') || '<div class="empty">No combos returned — try loosening constraints.</div>';
      out.innerHTML = `
        <div class="section-title" style="margin-top:0">Results · ${data.menu_item_count} menu items</div>
        <div class="tags-line">${tags}</div>
        ${data.summary ? '<div class="warn" style="background:rgba(255,255,255,.05);color:var(--muted)">' + data.summary + '</div>' : ''}
        ${combos}`;
    }

    document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') runSearch(); });
    buildChips();
    checkStatus(); loadSaved();
  </script>
</body>
</html>
